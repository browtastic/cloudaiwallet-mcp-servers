name: cloudaiwallet
displayName: CloudAIWallet
description: |
  MCP-native access to the AICryptoVault crypto wallet platform. Query wallet balances,
  accounts, transactions, and API keys via a Neo4j knowledge graph and SQL database;
  read platform configuration and files; and run operational commands. Built for AI
  agents that manage crypto wallet infrastructure.
homepage: https://github.com/browtastic/cloudaiwallet-mcp-servers
license: MIT
keywords:
  - crypto
  - wallet
  - blockchain
  - defi
  - mcp
  - finance
category: finance
runtime: python
runtime_version: "^>=3.12"
remote:
  transport: sse
  url: https://agent.aicryptovault.net/sse
servers:
  - name: graph-api
    transport: sse
    url: https://mcp.aicryptovault.net/sse
    description: Wallet knowledge graph - users, wallets, accounts, API keys, trading bots
  - name: database-api
    transport: sse
    url: https://db.aicryptovault.net/sse
    description: Transactions, accounts, and platform configuration
  - name: storage-api
    transport: sse
    url: https://fs.aicryptovault.net/sse
    description: Platform files and configuration
